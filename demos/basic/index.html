<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowChat Demo — 1K Messages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; font-weight: 600; }
    .stats { font-size: 13px; color: #888; display: flex; gap: 16px; }
    .stat { display: flex; align-items: center; gap: 4px; }
    .stat .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; }
    .dot.blue { background: #3b82f6; }
    .dot.yellow { background: #eab308; }
    #chat-container { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: auto; }
    .spacer { position: relative; }
    .messages { display: flex; flex-direction: column; gap: 8px; }
    .message { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; animation: fadeIn 0.15s ease; }
    .message.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant { align-self: flex-start; background: #1e1e1e; color: #e5e5e5; border-bottom-left-radius: 4px; }
    .message .meta { font-size: 11px; color: #666; margin-top: 4px; }
    .controls { padding: 12px 24px; border-top: 1px solid #222; display: flex; gap: 12px; align-items: center; }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 13px; transition: background 0.15s; }
    button:hover { background: #2a2a2a; }
    button.primary { background: #2563eb; border-color: #2563eb; }
    button.primary:hover { background: #1d4ed8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <header>
    <h1>⚡ FlowChat Demo</h1>
    <div class="stats">
      <div class="stat"><div class="dot green"></div><span id="msg-count">0</span> messages</div>
      <div class="stat"><div class="dot blue"></div><span id="dom-count">0</span> DOM nodes</div>
      <div class="stat"><div class="dot yellow"></div><span id="render-time">0</span>ms render</div>
    </div>
  </header>
  <div id="chat-container">
    <div class="spacer">
      <div class="messages" id="messages"></div>
    </div>
  </div>
  <div class="controls">
    <button class="primary" onclick="loadMessages(100)">+ 100 messages</button>
    <button onclick="loadMessages(500)">+ 500</button>
    <button onclick="loadMessages(1000)">+ 1,000</button>
    <button onclick="clearAll()">Clear</button>
    <button onclick="simulateStream()">▶ Simulate Stream</button>
  </div>

  <script>
    const container = document.getElementById('chat-container')
    const messagesEl = document.getElementById('messages')
    const msgCountEl = document.getElementById('msg-count')
    const domCountEl = document.getElementById('dom-count')
    const renderTimeEl = document.getElementById('render-time')

    let messages = []
    let visibleStart = 0
    let visibleEnd = 0
    const ITEM_HEIGHT_ESTIMATE = 60
    const OVERSCAN = 10
    const VIEWPORT_BUFFER = 5

    // Sample content pools
    const userMessages = [
      "이거 어떻게 해?", "코드 리뷰 해줘", "오늘 뭐 할까?",
      "파이썬으로 피보나치 함수 짜줘", "README 수정해줘",
      "배포 상태 알려줘", "테스트 돌려봐", "이 에러 왜 나는 거야?",
      "점심 뭐 먹지?", "PR 올려줘", "How does this work?",
      "Can you explain the architecture?", "Fix the bug in auth module",
    ]

    const assistantMessages = [
      "좋아, 바로 해볼게. 먼저 구조를 확인하고 수정할게.",
      "```python\ndef fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)\n```\n이렇게 하면 돼.",
      "코드 리뷰 결과:\n1. ✅ 타입 정의 깔끔함\n2. ⚠️ 에러 핸들링 추가 필요\n3. ❌ 테스트 커버리지 부족\n\n전체적으로 괜찮은데 에러 처리만 보강하면 될 것 같아.",
      "배포 완료! 🚀\n- URL: https://app.example.com\n- Build time: 32s\n- Status: healthy",
      "알겠어, 잠깐만. 확인해볼게.\n\n원인은 인증 토큰 만료야. `refreshToken()` 호출하면 해결돼.",
      "테스트 결과:\n✅ 21/21 passed (0.14s)\n\n전부 통과했어. 머지해도 될 것 같아.",
      "Sure, let me explain the architecture:\n\n1. **HeightEngine** — measures text height without DOM\n2. **ViewportManager** — prefix-sum for O(log n) scroll\n3. **StreamHandler** — batches updates via requestAnimationFrame\n\nThe key insight is that Pretext's `layout()` is pure arithmetic (~0.09ms for 500 texts), so we can measure heights without triggering browser reflow.",
      "그건 좀 복잡한 문제인데, 단계별로 정리해줄게:\n\n**Step 1:** 먼저 로그를 확인해봐\n**Step 2:** 환경변수 체크\n**Step 3:** DB 연결 상태 확인\n\n대부분 Step 2에서 해결되더라.",
    ]

    function randomMessage(index) {
      const isUser = Math.random() > 0.45
      const pool = isUser ? userMessages : assistantMessages
      const content = pool[Math.floor(Math.random() * pool.length)]
      return {
        id: `msg-${index}`,
        role: isUser ? 'user' : 'assistant',
        content: content,
        timestamp: Date.now() - (10000 - index) * 60000,
      }
    }

    function loadMessages(count) {
      const t0 = performance.now()
      const startIdx = messages.length
      for (let i = 0; i < count; i++) {
        messages.push(randomMessage(startIdx + i))
      }
      renderVirtualized()
      const elapsed = (performance.now() - t0).toFixed(1)
      renderTimeEl.textContent = elapsed
      msgCountEl.textContent = messages.length

      // Auto-scroll to bottom
      requestAnimationFrame(() => {
        container.scrollTop = container.scrollHeight
      })
    }

    function clearAll() {
      messages = []
      messagesEl.innerHTML = ''
      msgCountEl.textContent = '0'
      domCountEl.textContent = '0'
      renderTimeEl.textContent = '0'
    }

    function renderVirtualized() {
      const scrollTop = container.scrollTop
      const viewportHeight = container.clientHeight
      const totalHeight = messages.length * ITEM_HEIGHT_ESTIMATE

      // Calculate visible range
      const rawStart = Math.floor(scrollTop / ITEM_HEIGHT_ESTIMATE)
      const rawEnd = Math.ceil((scrollTop + viewportHeight) / ITEM_HEIGHT_ESTIMATE)
      const start = Math.max(0, rawStart - OVERSCAN)
      const end = Math.min(messages.length, rawEnd + OVERSCAN)

      if (start === visibleStart && end === visibleEnd) return
      visibleStart = start
      visibleEnd = end

      // Build visible messages
      const fragment = document.createDocumentFragment()
      for (let i = start; i < end; i++) {
        const msg = messages[i]
        const div = document.createElement('div')
        div.className = `message ${msg.role}`
        div.textContent = msg.content
        div.style.transform = `translateY(${i * ITEM_HEIGHT_ESTIMATE}px)`
        div.style.position = 'absolute'
        div.style.left = msg.role === 'user' ? 'auto' : '16px'
        div.style.right = msg.role === 'user' ? '16px' : 'auto'
        div.style.width = 'fit-content'
        fragment.appendChild(div)
      }

      messagesEl.style.height = totalHeight + 'px'
      messagesEl.style.position = 'relative'
      messagesEl.innerHTML = ''
      messagesEl.appendChild(fragment)

      domCountEl.textContent = (end - start)
    }

    async function simulateStream() {
      const msgId = messages.length
      const msg = {
        id: `msg-${msgId}`,
        role: 'assistant',
        content: '',
        timestamp: Date.now(),
      }
      messages.push(msg)

      const fullText = "스트리밍 데모입니다! 토큰이 하나씩 들어오는 것처럼 보이죠? FlowChat은 requestAnimationFrame으로 배치 처리해서 매 프레임마다 한 번만 높이를 재계산합니다. 이렇게 하면 1,000개 메시지가 있어도 60fps를 유지할 수 있어요. 🚀"
      const tokens = fullText.split('')

      for (const token of tokens) {
        msg.content += token
        renderVirtualized()
        msgCountEl.textContent = messages.length
        container.scrollTop = container.scrollHeight
        await new Promise(r => setTimeout(r, 30))
      }
    }

    // Scroll event for virtualization
    container.addEventListener('scroll', () => {
      requestAnimationFrame(renderVirtualized)
    })

    // Initial load
    loadMessages(100)
  </script>
</body>
</html>
